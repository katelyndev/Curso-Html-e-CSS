<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.conteiner {
           background-color: #1a72b9; 
           display: flex;
           flex-flow: row wrap;
           /*Tag acima nowrap nao quebra linha   */
           
        }

        div.item{
            background-color: #CAE8AF;
            border: 1px solid black;
            /* Tag text-aling deixa no centro o texto */
            text-align: center;
            /* Tag abaixo que estabelece um tamanho de filhos */
            flex-basis: 200px;
  
        } 
        div#caxA{
            flex-shrink: 1;
            flex-grow: 0;
  
        }
        div#caxB{
            flex-shrink: 1;
            flex-grow: 1;
        }
        div#caxC{
            flex-shrink: 1;
            flex-grow: 0;
        }
    </style>
</head>
<body>
    <div class="conteiner">
    <div class="item" id="caxA">A</div>
    <div class="item" id="caxB">B</div>
    <div class="item" id="caxc">C</div> 
    
</body>
</html>
