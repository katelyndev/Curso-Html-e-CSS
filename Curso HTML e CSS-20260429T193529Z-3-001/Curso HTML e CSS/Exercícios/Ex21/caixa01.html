<!DOCTYPE html>
<html lang="pt-bt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de Caixas</title>
    <style>
        h1 { 
            /* Box-level */
            background-color: rgb(127, 127, 170);
            height: 300px;
            width: 300px;

            /* Isso foi simplificado a baixo:
             border-width: 10px;
            border-style: solid;
            border-color: cor; */

            border: 10px solid darkolivegreen;

            /* Padding borda de dentro */
            padding: 10px 10px 10px 10px;

            /*  Isso foi simplificado a baixo:
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px; */

            /* Sempre configurar na ordem do relogio as margens */

            margin: 20px auto 20px auto;
            /*  A margem codigo
            margin: 20px 20px 40px 20 px;
             */
            /* Isso foi simplificado abaixo
             margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 40px;
            margin-left: 20px; */

            /* Tag margin: auto; é para deixar o elmento no meio */

            
            /* Isso foi simplificado a baixo
            outline-width: 5px;
            outline-style: dashed;
            outline-color: seagreen; */

            /* O outline-width está entre a borda e margem  o dashed é tracejado*/
            outline: 5px das seagreen;
        }
        a {
            /* Inline-level */
            /* Border da uns escpaços */
            border-width: 10px;
            border-style: solid;
            border-color: aquamarine;
        }

    </style>
</head>
<body>
    <h1>Exemplo de caixas box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo funcional.</p>
</body>
</html>
