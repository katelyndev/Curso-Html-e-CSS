<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-Class</title>
    <style>
        div {
            /* Deixa ou deitado ou em pé */
            display: inline-block; 
            background-color: rgba(127, 255, 212, 0.623);
            /* A Tag border é para borda */
            border: 1px solid black;
            text-align: center;
            /* A Tag height é altura */
            height: 200px;
            /* A Tag width é largura */
            width: 200px;
            
        }
        /* A Tag dic:hover quando passar o maouse por cima ela muda de cor */
        div:hover {
            background-color: yellow;

        }
    </style>
</head>
<body>
    <div id="d1">01</div>
    <div id="d2">02</div>
    <div id="d3">03</div>

    <p><a href="houve.html">Ir para a proxima pagina</a></p>

    <p><a href="links.html">Ir para listas</a></p>
    
</body>
</html>
