<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.conteiner {
           background-color: rgb(26, 114, 185); 

           display: flex;
        }

        div.item{
            background-color: #CAE8AF;
            border: 1px solid black;
            /* Tag text-aling deixa no centro o texto */
            text-align: center;
            /* Tag flex deixa flexicivel  */
            flex: auto;
        }
    </style>
</head>
<body>
    <div class="conteiner">
    <div class="item">A</div>
    <div class="item">B</div>
    <div class="item">C</div>
    <div class="item">D</div>
    <div class="item">F</div>
    <div class="item">G</div>
    </div>
</body>
</html>
