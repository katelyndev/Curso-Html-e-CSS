<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.conteiner {
           background-color: rgb(26, 114, 185); 

           display: flex;
           /* Tag onde coloca as direcoes das colunas */
           /* flex-direction: row;
           /* Tag abaixo direção horizonteal dos blocos 
           flex-direction: row-reverse;
           /* Tag abaixo direção vertical 
           flex-wrap: wrap; */

           /* Tudo em cima foi simplificado a baixo (direção e forma de empacotamento*/
           flex-flow: row wrap;
        }

        div.item{
            background-color: #CAE8AF;
            border: 1px solid black;
            /* Tag text-aling deixa no centro o texto */
            text-align: center;
            
            /* Tag padding usa-se para aumentar tamanho de caixa */
            padding: 10px;

            /* Tag abaixo Nao tenha espaço em brnaco no elemento pai  */
            flex: auto;
        }
    </style>
</head>
<body>
    <div class="conteiner">
    <div class="item">Exemplo de Bloco A</div>
    <div class="item">Exemplo de Bloco B</div>
    <div class="item">Exemplo de Bloco C</div>
    <div class="item">Exemplo de Bloco D</div>
    <div class="item">Exemplo de Bloco F</div>
    <div class="item">Exemplo de Bloco G</div>
    </div>
</body>
</html>
